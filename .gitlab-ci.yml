stages:
  - build
  - test
  - package
  - deploy

default:
  tags:
    - maven
    - shell

myapp-build:
  stage: build
  before_script:
    - echo "Verifying maven installation..."
    - mvn --version
  script:
    - mvn compile

myapp-test:
  stage: test
  before_script:
    - echo "Running test cases..."
  script:
    - mvn test

myapp-package:
  stage: package
  script:
    - mvn package
  artifacts:
    paths:
      - target/

myapp-run:
  stage: deploy
  script:
    - java -jar target/techapp-1.0.0.jar